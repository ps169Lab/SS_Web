<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Animator - Simple Edition</title>
    
    <!-- 1. Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 3. React and Tools -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/gifshot@0.4.5/dist/gifshot.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="range"] { accent-color: #f97316; }
        /* Fix for Lucide icons in CDN version */
        svg.lucide { display: inline-block; vertical-align: middle; stroke: currentColor; fill: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Fixed Icon Component for CDN version
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconRef.current.setAttribute('data-lucide', iconName);
                    window.lucide.createIcons();
                }
            }, [name, className]);

            return <i ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></i>;
        };

        const DEFAULT_COLOR = '#000000';
        const EMPTY_COLOR = 'transparent';

        function App() {
            const [gridSize, setGridSize] = useState(16);
            const [frames, setFrames] = useState([Array(16 * 16).fill(EMPTY_COLOR)]);
            const [currentFrameIndex, setCurrentFrameIndex] = useState(0);
            const [brushColor, setBrushColor] = useState(DEFAULT_COLOR);
            const [canvasBgColor, setCanvasBgColor] = useState('#ffffff'); // New: Background color
            const [tool, setTool] = useState('pencil');
            const [isPlaying, setIsPlaying] = useState(false);
            const [fps, setFps] = useState(8);
            const [history, setHistory] = useState([[Array(16 * 16).fill(EMPTY_COLOR)]]);
            const [historyIndex, setHistoryIndex] = useState(0);
            const [isExporting, setIsExporting] = useState(false);
            const [isMouseDown, setIsMouseDown] = useState(false);

            const canvasRef = useRef(null);

            // Animation logic
            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        setCurrentFrameIndex((prev) => (prev + 1) % frames.length);
                    }, 1000 / fps);
                }
                return () => clearInterval(interval);
            }, [isPlaying, fps, frames.length]);

            const saveToHistory = (newFrames) => {
                const newHistory = history.slice(0, historyIndex + 1);
                newHistory.push(JSON.parse(JSON.stringify(newFrames)));
                if (newHistory.length > 50) newHistory.shift();
                setHistory(newHistory);
                setHistoryIndex(newHistory.length - 1);
            };

            const undo = () => {
                if (historyIndex > 0) {
                    const prev = history[historyIndex - 1];
                    setFrames(JSON.parse(JSON.stringify(prev)));
                    setHistoryIndex(historyIndex - 1);
                }
            };

            const redo = () => {
                if (historyIndex < history.length - 1) {
                    const next = history[historyIndex + 1];
                    setFrames(JSON.parse(JSON.stringify(next)));
                    setHistoryIndex(historyIndex + 1);
                }
            };

            const updatePixel = (index) => {
                const newFrames = [...frames];
                const currentFrame = [...newFrames[currentFrameIndex]];
                const color = tool === 'pencil' ? brushColor : EMPTY_COLOR;
                
                if (currentFrame[index] === color) return;
                
                currentFrame[index] = color;
                newFrames[currentFrameIndex] = currentFrame;
                setFrames(newFrames);
                saveToHistory(newFrames);
            };

            const addFrame = () => {
                const newFrames = [...frames];
                newFrames.splice(currentFrameIndex + 1, 0, Array(gridSize * gridSize).fill(EMPTY_COLOR));
                setFrames(newFrames);
                setCurrentFrameIndex(currentFrameIndex + 1);
                saveToHistory(newFrames);
            };

            const duplicateFrame = () => {
                const newFrames = [...frames];
                newFrames.splice(currentFrameIndex + 1, 0, [...frames[currentFrameIndex]]);
                setFrames(newFrames);
                setCurrentFrameIndex(currentFrameIndex + 1);
                saveToHistory(newFrames);
            };

            const deleteFrame = (index) => {
                if (frames.length <= 1) return;
                const newFrames = frames.filter((_, i) => i !== index);
                setFrames(newFrames);
                if (currentFrameIndex >= newFrames.length) {
                    setCurrentFrameIndex(newFrames.length - 1);
                }
                saveToHistory(newFrames);
            };

            const downloadGIF = () => {
                if (!window.gifshot) {
                    alert("GIF library is still loading. Please try again in a moment.");
                    return;
                }
                setIsExporting(true);
                const pixelSize = 10;
                const size = gridSize * pixelSize;
                const images = [];

                frames.forEach((frame) => {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = size;
                    tempCanvas.height = size;
                    const tempCtx = tempCanvas.getContext('2d');
                    
                    // Fill background first
                    tempCtx.fillStyle = canvasBgColor;
                    tempCtx.fillRect(0, 0, size, size);

                    frame.forEach((color, pixelIdx) => {
                        if (color !== EMPTY_COLOR) {
                            const x = (pixelIdx % gridSize) * pixelSize;
                            const y = Math.floor(pixelIdx / gridSize) * pixelSize;
                            tempCtx.fillStyle = color;
                            tempCtx.fillRect(x, y, pixelSize, pixelSize);
                        }
                    });
                    images.push(tempCanvas.toDataURL());
                });

                window.gifshot.createGIF({
                    images: images,
                    gifWidth: size,
                    gifHeight: size,
                    interval: 1 / fps
                }, (obj) => {
                    if (!obj.error) {
                        const link = document.createElement('a');
                        link.download = 'pixel-animation.gif';
                        link.href = obj.image;
                        link.click();
                    }
                    setIsExporting(false);
                });
            };

            const downloadPNG = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pixelSize = 10;
                canvas.width = gridSize * pixelSize * frames.length;
                canvas.height = gridSize * pixelSize;

                // Fill background
                ctx.fillStyle = canvasBgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                frames.forEach((frame, frameIdx) => {
                    frame.forEach((color, pixelIdx) => {
                        if (color !== EMPTY_COLOR) {
                            const x = (frameIdx * gridSize + (pixelIdx % gridSize)) * pixelSize;
                            const y = Math.floor(pixelIdx / gridSize) * pixelSize;
                            ctx.fillStyle = color;
                            ctx.fillRect(x, y, pixelSize, pixelSize);
                        }
                    });
                });

                const link = document.createElement('a');
                link.download = 'pixel-animation.png';
                link.href = canvas.toDataURL();
                link.click();
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900">
                    {/* Header */}
                    <header className="border-b border-slate-200 p-4 flex items-center justify-between bg-white sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center shadow-lg shadow-orange-500/20">
                                <Icon name="Grid3X3" className="w-5 h-5 text-white" />
                            </div>
                            <h1 className="text-xl font-bold tracking-tighter italic uppercase">Pixel Animator</h1>
                        </div>
                        
                        <div className="flex items-center gap-2">
                            <button onClick={downloadPNG} className="flex items-center gap-2 bg-white hover:bg-slate-50 text-slate-600 px-4 py-2 rounded-lg font-bold text-sm border border-slate-200">
                                <Icon name="Download" className="w-4 h-4" /> PNG
                            </button>
                            <button onClick={downloadGIF} disabled={isExporting} className="flex items-center gap-2 bg-orange-500 hover:bg-orange-600 disabled:bg-orange-300 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg shadow-orange-500/20">
                                <Icon name="Download" className="w-4 h-4" /> {isExporting ? "EXPORTING..." : "GIF"}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-8">
                        <div className="space-y-6">
                            {/* Editor */}
                            <div className="flex flex-col items-center justify-center bg-white border border-slate-200 rounded-3xl p-8 min-h-[500px] shadow-xl relative">
                                <div 
                                    className="grid gap-0 border border-slate-200 shadow-2xl"
                                    style={{ 
                                        gridTemplateColumns: `repeat(${gridSize}, 1fr)`,
                                        width: 'min(80vw, 480px)',
                                        aspectRatio: '1/1',
                                        backgroundColor: canvasBgColor // Apply background color to editor
                                    }}
                                    onMouseDown={() => setIsMouseDown(true)}
                                    onMouseUp={() => setIsMouseDown(false)}
                                    onMouseLeave={() => setIsMouseDown(false)}
                                >
                                    {frames[currentFrameIndex].map((color, i) => (
                                        <div
                                            key={i}
                                            onMouseDown={() => updatePixel(i)}
                                            onMouseEnter={() => isMouseDown && updatePixel(i)}
                                            className="w-full h-full border-[0.5px] border-slate-200/20 cursor-crosshair"
                                            style={{ backgroundColor: color }}
                                        />
                                    ))}
                                </div>

                                {/* Tools */}
                                <div className="mt-8 flex items-center gap-4 bg-slate-100 p-2 rounded-2xl border border-slate-200">
                                    <button onClick={undo} disabled={historyIndex <= 0} className="p-2 hover:bg-white rounded-xl disabled:opacity-30"><Icon name="Undo" className="w-5 h-5 text-slate-600" /></button>
                                    <button onClick={redo} disabled={historyIndex >= history.length - 1} className="p-2 hover:bg-white rounded-xl disabled:opacity-30"><Icon name="Redo" className="w-5 h-5 text-slate-600" /></button>
                                    <button onClick={() => {
                                        const newFrames = [...frames];
                                        newFrames[currentFrameIndex] = Array(gridSize * gridSize).fill(EMPTY_COLOR);
                                        setFrames(newFrames);
                                        saveToHistory(newFrames);
                                    }} className="p-2 hover:bg-red-50 text-red-500 rounded-xl"><Icon name="Trash2" className="w-5 h-5" /></button>
                                    <div className="w-px h-6 bg-slate-200" />
                                    <button onClick={() => setTool('pencil')} className={`p-2 rounded-xl transition-colors ${tool === 'pencil' ? "bg-orange-500 text-white" : "hover:bg-white text-slate-600"}`}>
                                        <Icon name="Pencil" className="w-5 h-5" />
                                    </button>
                                    <button onClick={() => setTool('eraser')} className={`p-2 rounded-xl transition-colors ${tool === 'eraser' ? "bg-orange-500 text-white" : "hover:bg-white text-slate-600"}`}>
                                        <Icon name="Eraser" className="w-5 h-5" />
                                    </button>
                                    <div className="w-px h-6 bg-slate-200" />
                                    <div className="flex flex-col items-center">
                                        <span className="text-[8px] font-bold uppercase text-slate-400 mb-1">Brush</span>
                                        <input type="color" value={brushColor} onChange={(e) => setBrushColor(e.target.value)} className="w-8 h-8 rounded-lg cursor-pointer bg-white p-0.5 border border-slate-200" />
                                    </div>
                                </div>
                            </div>

                            {/* Timeline */}
                            <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-lg">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400">Timeline</h3>
                                    <div className="flex gap-2">
                                        <button onClick={addFrame} className="p-2 hover:bg-slate-100 rounded-xl text-orange-500 border border-slate-100"><Icon name="Plus" className="w-4 h-4" /></button>
                                        <button onClick={duplicateFrame} className="p-2 hover:bg-slate-100 rounded-xl text-slate-400 border border-slate-100"><Icon name="Copy" className="w-4 h-4" /></button>
                                    </div>
                                </div>
                                <div className="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
                                    {frames.map((frame, i) => (
                                        <div key={i} onClick={() => setCurrentFrameIndex(i)} className={`relative flex-shrink-0 w-24 h-24 rounded-2xl border-2 cursor-pointer transition-all overflow-hidden bg-slate-50 ${currentFrameIndex === i ? "border-orange-500 scale-105 shadow-lg" : "border-slate-100 hover:border-slate-200"}`}>
                                            <div className="grid w-full h-full" style={{ gridTemplateColumns: `repeat(${gridSize}, 1fr)`, backgroundColor: canvasBgColor }}>
                                                {frame.map((color, j) => <div key={j} style={{ backgroundColor: color }} />)}
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); deleteFrame(i); }} className="absolute top-2 right-2 p-1 bg-white hover:bg-red-500 hover:text-white text-red-500 rounded-lg shadow-sm"><Icon name="Trash2" className="w-3 h-3" /></button>
                                            <div className="absolute bottom-2 left-2 px-2 py-0.5 bg-white/90 rounded-md text-[10px] font-bold text-slate-400">{i + 1}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Sidebar */}
                        <aside className="space-y-6">
                            <div className="bg-white border border-slate-200 rounded-3xl p-6 space-y-6 shadow-lg">
                                <h3 className="text-sm font-bold uppercase tracking-widest">Preview</h3>
                                <div className="aspect-square bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center overflow-hidden relative">
                                    <div className="grid w-full h-full" style={{ gridTemplateColumns: `repeat(${gridSize}, 1fr)`, backgroundColor: canvasBgColor }}>
                                        {frames[currentFrameIndex].map((color, i) => <div key={i} style={{ backgroundColor: color }} />)}
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <button onClick={() => setIsPlaying(!isPlaying)} className={`w-full flex items-center justify-center gap-2 py-4 rounded-2xl font-bold transition-all shadow-lg ${isPlaying ? "bg-slate-900 text-white" : "bg-orange-500 text-white hover:bg-orange-600"}`}>
                                        <Icon name={isPlaying ? "Pause" : "Play"} className="w-5 h-5" /> {isPlaying ? "PAUSE" : "PLAY"}
                                    </button>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                                            <span>Playback Speed</span>
                                            <span className="text-orange-500">{fps} FPS</span>
                                        </div>
                                        <input type="range" min="1" max="24" value={fps} onChange={(e) => setFps(parseInt(e.target.value))} className="w-full h-2 rounded-lg appearance-none cursor-pointer" />
                                    </div>
                                </div>
                            </div>

                            {/* Background Color Picker */}
                            <div className="bg-white border border-slate-200 rounded-3xl p-6 space-y-4 shadow-lg">
                                <h3 className="text-sm font-bold uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="Settings" className="w-4 h-4 text-orange-500" /> Canvas Settings
                                </h3>
                                <div className="flex items-center justify-between">
                                    <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Background</span>
                                    <input type="color" value={canvasBgColor} onChange={(e) => setCanvasBgColor(e.target.value)} className="w-10 h-10 rounded-xl cursor-pointer bg-white p-1 border border-slate-200" />
                                </div>
                                <p className="text-[10px] text-slate-400 leading-tight">Choose a background color to avoid transparency issues in downloads.</p>
                            </div>

                            <div className="bg-white border border-slate-200 rounded-3xl p-6 space-y-4 shadow-lg">
                                <h3 className="text-sm font-bold uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="Palette" className="w-4 h-4 text-orange-500" /> Palette
                                </h3>
                                <div className="grid grid-cols-6 gap-2">
                                    {['#000000', '#ffffff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#800080', '#008000', '#800000'].map((color) => (
                                        <button key={color} onClick={() => { setBrushColor(color); setTool('pencil'); }} className={`w-full aspect-square rounded-lg border border-slate-100 transition-all ${brushColor === color ? "ring-2 ring-orange-500 ring-offset-2" : ""}`} style={{ backgroundColor: color }} />
                                    ))}
                                </div>
                            </div>
                        </aside>
                    </main>
                    <canvas ref={canvasRef} className="hidden" />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
