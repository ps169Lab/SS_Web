<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>European Exploration — Matching Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #f8fafc;
    --border: #b8ccd8;
    --text: #1e2f3a;
    --muted: #5a7080;
    --accent: #2e6e8a;
    --accent-light: #e2f0f6;
    --match-bg: #e6f2f8;
    --match-border: #4a9ab8;
    --match-text: #1a4a5e;
    --wrong-bg: #fce8e8;
    --wrong-border: #b08080;
    --card-back: #2a5068;
    --card-back-2: #3a6e8a;
    --gold: #a07830;
  }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(46,110,138,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 90%, rgba(160,120,48,0.07) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--text);
    padding: 2rem 1rem 4rem;
  }

  header { text-align: center; margin-bottom: 2rem; }

  .title-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  .stats {
    display: inline-flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 7px 18px;
    font-size: 13px;
    color: var(--muted);
  }

  .stats span { font-weight: 600; color: var(--text); }
  .stat-divider { color: var(--border); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
    gap: 10px;
    max-width: 980px;
    margin: 0 auto;
  }

  .card {
    min-height: 96px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12px 10px;
    font-size: 13px;
    line-height: 1.4;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    user-select: none;
  }

  .card:hover:not(.face-down):not(.matched) { transform: scale(1.02); }

  .card.face-down {
    background: linear-gradient(145deg, var(--card-back), var(--card-back-2));
    border-color: var(--card-back);
    overflow: hidden;
  }

  .card.face-down::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .card.face-down::after {
    content: '?';
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: rgba(255,255,255,0.18);
  }

  .card.face-down:hover {
    transform: scale(1.04) translateY(-2px);
    box-shadow: 0 6px 20px rgba(46,110,138,0.22);
  }

  .card.face-down .card-text { opacity: 0; pointer-events: none; }

  .card.flipped {
    background: var(--accent-light);
    border-color: var(--accent);
  }

  .card.matched {
    background: var(--match-bg);
    border-color: var(--match-border);
    cursor: default;
    transform: none !important;
  }

  .card.matched .card-text { color: var(--match-text) !important; }

  .card.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
    animation: shake 0.4s ease;
  }

  .card.word .card-text {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
  }

  .card.def .card-text {
    font-size: 12px;
    color: var(--muted);
  }

  .card.flipped.word .card-text { color: var(--accent); }
  .card.flipped.def .card-text  { color: var(--accent); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    60% { transform: translateX(7px); }
    80% { transform: translateX(-4px); }
  }

  @keyframes matchPop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  .card.pop { animation: matchPop 0.3s ease; }

  .progress-bar-wrap {
    max-width: 300px;
    margin: 0 auto 1.5rem;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 1.25rem;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .restart-top {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 18px;
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    margin-top: 8px;
  }
  .restart-top:hover { border-color: var(--accent); color: var(--accent); }

  .win-screen {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    max-width: 480px;
    margin: 0 auto;
  }

  .win-screen.visible { display: block; }

  .trophy {
    font-size: 56px;
    margin-bottom: 1rem;
    animation: bounceIn 0.6s cubic-bezier(.36,.07,.19,.97);
  }

  @keyframes bounceIn {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .win-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .win-screen p {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 1.5rem;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 28px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn:hover  { background: #1e4e62; }
  .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<header>
  <div class="title-label">Social Studies · Grade 5</div>
  <h1>European Exploration &amp; Colonization</h1>
  <p class="subtitle">Match each word to what it means. Find all 16 pairs!</p>
  <div class="stats">
    <span id="matches">0</span> / 16 matched
    <span class="stat-divider">·</span>
    <span id="tries">0</span> tries
  </div>
  <br>
  <button class="restart-top" onclick="init()">↺ New game</button>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress"></div>
</div>

<div class="legend">
  <span><span class="legend-dot" style="background:#2e6e8a"></span>Vocabulary word</span>
  <span><span class="legend-dot" style="background:#5a7080"></span>What it means</span>
</div>

<div class="grid" id="grid"></div>

<div class="win-screen" id="win">
  <div class="trophy">🏆</div>
  <h2>You matched them all!</h2>
  <p id="win-msg"></p>
  <button class="btn" onclick="init()">Play again</button>
</div>

<script>
const pairs = [
  { word: "Age of Exploration",    def: "The time period (1400s–1600s) when Europeans sailed across the ocean and found the Americas" },
  { word: "The Three G's",         def: "Gold, Glory, and God — the three reasons Europeans explored new lands" },
  { word: "Colony",                def: "Land settled by people from another country and controlled by that country" },
  { word: "Mother Country",        def: "The home country that controls a colony far away" },
  { word: "Spanish & Portuguese",  def: "Colonial powers who settled South and Central America and focused on mining and sugarcane" },
  { word: "The British",           def: "Colonial power who settled the east coast of North America — some for religion, some for profit" },
  { word: "New England Colonies",  def: "British settlements in the North where people came for religious freedom" },
  { word: "Southern Colonies",     def: "British settlements in Virginia and the Carolinas where tobacco was grown for profit" },
  { word: "The French",            def: "Colonial power who traded furs in Canada and the Mississippi Valley and got along well with Native Americans" },
  { word: "The Dutch",             def: "Colonial power who built New Amsterdam in modern-day New York and focused on the fur trade" },
  { word: "New Amsterdam",         def: "Dutch city built in what is now New York — taken over by the British in 1664 and renamed" },
  { word: "Columbian Exchange",    def: "The transfer of plants, animals, ideas, and people between Europe and the Americas" },
  { word: "Old World",             def: "Europe, Africa, and Asia — the lands that were already connected before 1492" },
  { word: "New World",             def: "The Americas — called this by Europeans when they arrived" },
  { word: "Smallpox",              def: "A disease brought by Europeans that killed huge numbers of Native Americans" },
  { word: "Slavery",               def: "The forced capture of people from Africa to work on colonial farms after Native American populations fell" },
];

let flipped = [], waiting = [], matchCount = 0, tries = 0;
const grid = document.getElementById('grid');
const TOTAL = pairs.length;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  flipped = []; waiting = []; matchCount = 0; tries = 0;
  document.getElementById('matches').textContent = 0;
  document.getElementById('tries').textContent = 0;
  document.getElementById('progress').style.width = '0%';
  document.getElementById('win').classList.remove('visible');
  grid.style.display = 'grid';
  grid.innerHTML = '';

  const cards = [];
  pairs.forEach((p, i) => {
    cards.push({ id: i, type: 'word', text: p.word });
    cards.push({ id: i, type: 'def',  text: p.def  });
  });

  shuffle(cards).forEach(c => {
    const el = document.createElement('div');
    el.className = `card face-down ${c.type}`;
    el.dataset.id = c.id;
    el.innerHTML = `<span class="card-text">${c.text}</span>`;
    el.addEventListener('click', () => flip(el, c));
    grid.appendChild(el);
  });
}

function clearWaiting() {
  waiting.forEach(el => {
    el.classList.remove('flipped', 'wrong');
    el.classList.add('face-down');
  });
  waiting = [];
}

function flip(el, c) {
  if (flipped.includes(el) || el.classList.contains('matched')) return;
  if (waiting.length > 0) clearWaiting();

  el.classList.remove('face-down');
  el.classList.add('flipped');
  flipped.push(el);

  if (flipped.length === 2) {
    tries++;
    document.getElementById('tries').textContent = tries;

    const [a, b] = flipped;
    flipped = [];

    if (a.dataset.id === b.dataset.id && a !== b) {
      setTimeout(() => {
        [a, b].forEach(el => {
          el.classList.remove('flipped');
          el.classList.add('matched', 'pop');
        });
        matchCount++;
        document.getElementById('matches').textContent = matchCount;
        document.getElementById('progress').style.width = (matchCount / TOTAL * 100) + '%';
        if (matchCount === TOTAL) setTimeout(showWin, 400);
      }, 300);
    } else {
      [a, b].forEach(el => el.classList.add('wrong'));
      waiting = [a, b];
    }
  }
}

function showWin() {
  grid.style.display = 'none';
  const win = document.getElementById('win');
  win.classList.add('visible');
  const efficiency = Math.round((TOTAL / tries) * 100);
  document.getElementById('win-msg').textContent =
    `You finished in ${tries} tr${tries === 1 ? 'y' : 'ies'} — ${efficiency}% efficiency!`;
}

init();
</script>
</body>
</html>
