<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Animator - Simple Edition</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/gifshot@0.4.5/dist/gifshot.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .timeline-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .timeline-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .timeline-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .timeline-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        input[type="range"] {
            accent-color: #f97316;
        }

        svg.lucide {
            display: inline-block;
            vertical-align: middle;
            stroke: currentColor;
            fill: none;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconRef.current.setAttribute('data-lucide', iconName);
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <i ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></i>;
        };

        const DEFAULT_COLOR = '#3333ff';
        const EMPTY_COLOR = 'transparent';

        function App() {
            const [gridSize, setGridSize] = useState(window.innerWidth < 768 ? 16 : 32);
            const [pendingGridSize, setPendingGridSize] = useState(null);
            const [frames, setFrames] = useState([Array(window.innerWidth < 768 ? 16 * 16 : 32 * 32).fill(EMPTY_COLOR)]);
            const [currentFrameIndex, setCurrentFrameIndex] = useState(0);
            const [brushColor, setBrushColor] = useState(DEFAULT_COLOR);
            const [canvasBgColor, setCanvasBgColor] = useState('#ffffff');
            const [studentName, setStudentName] = useState('');
            const [tool, setTool] = useState('pencil');
            const [isPlaying, setIsPlaying] = useState(false);
            const [fps, setFps] = useState(8);
            const [history, setHistory] = useState([[Array(window.innerWidth < 768 ? 16 * 16 : 32 * 32).fill(EMPTY_COLOR)]]);
            const [historyIndex, setHistoryIndex] = useState(0);
            const [isExporting, setIsExporting] = useState(false);
            const [isMouseDown, setIsMouseDown] = useState(false);
            const [loadError, setLoadError] = useState('');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const newFrames = [Array(gridSize * gridSize).fill(EMPTY_COLOR)];
                setFrames(newFrames);
                setCurrentFrameIndex(0);
                setHistory([newFrames]);
                setHistoryIndex(0);
            }, [gridSize]);

            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        setCurrentFrameIndex((prev) => (prev + 1) % frames.length);
                    }, 1000 / fps);
                }
                return () => clearInterval(interval);
            }, [isPlaying, fps, frames.length]);

            const handleGridSizeChange = (newSize) => {
                const size = Math.max(4, Math.min(64, newSize));
                const hasDrawn = frames.some(frame => frame.some(pixel => pixel !== EMPTY_COLOR));
                if (hasDrawn) {
                    setPendingGridSize(size);
                } else {
                    setGridSize(size);
                }
            };

            const confirmGridSizeChange = () => {
                if (pendingGridSize !== null) {
                    setGridSize(pendingGridSize);
                    setPendingGridSize(null);
                }
            };

            const saveToHistory = (newFrames) => {
                const newHistory = history.slice(0, historyIndex + 1);
                newHistory.push(JSON.parse(JSON.stringify(newFrames)));
                if (newHistory.length > 50) newHistory.shift();
                setHistory(newHistory);
                setHistoryIndex(newHistory.length - 1);
            };

            const undo = () => {
                if (historyIndex > 0) {
                    const prev = history[historyIndex - 1];
                    setFrames(JSON.parse(JSON.stringify(prev)));
                    setHistoryIndex(historyIndex - 1);
                }
            };

            const redo = () => {
                if (historyIndex < history.length - 1) {
                    const next = history[historyIndex + 1];
                    setFrames(JSON.parse(JSON.stringify(next)));
                    setHistoryIndex(historyIndex + 1);
                }
            };

            const updatePixel = (index) => {
                const newFrames = [...frames];
                const currentFrame = [...newFrames[currentFrameIndex]];
                const color = tool === 'pencil' ? brushColor : EMPTY_COLOR;
                if (currentFrame[index] === color) return;
                currentFrame[index] = color;
                newFrames[currentFrameIndex] = currentFrame;
                setFrames(newFrames);
                saveToHistory(newFrames);
            };

            const addFrame = () => {
                const newFrames = [...frames];
                newFrames.splice(currentFrameIndex + 1, 0, Array(gridSize * gridSize).fill(EMPTY_COLOR));
                setFrames(newFrames);
                setCurrentFrameIndex(currentFrameIndex + 1);
                saveToHistory(newFrames);
            };

            const duplicateFrame = () => {
                const newFrames = [...frames];
                newFrames.splice(currentFrameIndex + 1, 0, [...frames[currentFrameIndex]]);
                setFrames(newFrames);
                setCurrentFrameIndex(currentFrameIndex + 1);
                saveToHistory(newFrames);
            };

            const deleteFrame = (index) => {
                if (frames.length <= 1) return;
                const newFrames = frames.filter((_, i) => i !== index);
                setFrames(newFrames);
                if (currentFrameIndex >= newFrames.length) {
                    setCurrentFrameIndex(newFrames.length - 1);
                }
                saveToHistory(newFrames);
            };

            const getFileName = (ext) => {
                const name = studentName.trim() || 'Pixel_Art';
                return `${name}_Animation.${ext}`;
            };

            // --- Save Project ---
            const saveProject = () => {
                const projectData = {
                    version: 1,
                    gridSize,
                    fps,
                    canvasBgColor,
                    studentName,
                    frames,
                };
                const json = JSON.stringify(projectData);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = getFileName('json');
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            };

            // --- Load Project ---
            const loadProject = (e) => {
                setLoadError('');
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);

                        // Basic validation
                        if (
                            typeof data.gridSize !== 'number' ||
                            !Array.isArray(data.frames) ||
                            data.frames.length === 0
                        ) {
                            setLoadError('Invalid project file.');
                            return;
                        }

                        setGridSize(data.gridSize);
                        setFrames(data.frames);
                        setFps(data.fps ?? 8);
                        setCanvasBgColor(data.canvasBgColor ?? '#ffffff');
                        setStudentName(data.studentName ?? '');
                        setCurrentFrameIndex(0);
                        setHistory([data.frames]);
                        setHistoryIndex(0);
                    } catch (err) {
                        setLoadError('Could not read file. Make sure it is a valid Pixel Animator project.');
                    }
                };
                reader.readAsText(file);

                // Reset the input so the same file can be re-loaded if needed
                e.target.value = '';
            };

            const downloadGIF = () => {
                if (!window.gifshot) {
                    alert("GIF library is still loading. Please try again in a moment.");
                    return;
                }
                setIsExporting(true);
                const pixelSize = 10;
                const size = gridSize * pixelSize;
                const images = [];

                frames.forEach((frame) => {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = size;
                    tempCanvas.height = size;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.fillStyle = canvasBgColor;
                    tempCtx.fillRect(0, 0, size, size);
                    frame.forEach((color, pixelIdx) => {
                        if (color !== EMPTY_COLOR) {
                            const x = (pixelIdx % gridSize) * pixelSize;
                            const y = Math.floor(pixelIdx / gridSize) * pixelSize;
                            tempCtx.fillStyle = color;
                            tempCtx.fillRect(x, y, pixelSize, pixelSize);
                        }
                    });
                    images.push(tempCanvas.toDataURL());
                });

                window.gifshot.createGIF({
                    images,
                    gifWidth: size,
                    gifHeight: size,
                    interval: 1 / fps
                }, (obj) => {
                    if (!obj.error) {
                        const link = document.createElement('a');
                        link.download = getFileName('gif');
                        link.href = obj.image;
                        link.click();
                    }
                    setIsExporting(false);
                });
            };

            const downloadPNG = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pixelSize = 10;
                canvas.width = gridSize * pixelSize * frames.length;
                canvas.height = gridSize * pixelSize;
                ctx.fillStyle = canvasBgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                frames.forEach((frame, frameIdx) => {
                    frame.forEach((color, pixelIdx) => {
                        if (color !== EMPTY_COLOR) {
                            const x = (frameIdx * gridSize + (pixelIdx % gridSize)) * pixelSize;
                            const y = Math.floor(pixelIdx / gridSize) * pixelSize;
                            ctx.fillStyle = color;
                            ctx.fillRect(x, y, pixelSize, pixelSize);
                        }
                    });
                });
                const link = document.createElement('a');
                link.download = getFileName('png');
                link.href = canvas.toDataURL();
                link.click();
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900">
                    {/* Header */}
                    <header className="border-b border-slate-200 p-4 flex items-center justify-between bg-white sticky top-0 z-50 shadow-sm">
                        {/* Logo — always visible */}
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center shadow-lg shadow-orange-500/20">
                                <Icon name="Grid3X3" className="w-5 h-5 text-white" />
                            </div>
                            <h1 className="text-xl font-bold tracking-tighter italic uppercase">Pixel Animator</h1>
                        </div>

                        {/* Desktop nav — hidden on mobile */}
                        <div className="hidden md:flex items-center gap-3 flex-wrap justify-end">
                            <div className="flex items-center gap-3 bg-slate-100 px-3 py-1.5 rounded-xl border border-slate-200">
                                <span className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Grid Size</span>
                                <div className="flex items-center gap-2">
                                    <input
                                        type="number"
                                        value={gridSize}
                                        onChange={(e) => handleGridSizeChange(parseInt(e.target.value) || 16)}
                                        className="w-12 bg-white border border-slate-200 rounded px-1.5 py-0.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-orange-500/20"
                                    />
                                    <span className="text-xs text-slate-400 font-mono">px</span>
                                </div>
                            </div>
                            <button onClick={saveProject} className="flex items-center gap-2 bg-white hover:bg-slate-50 text-slate-600 px-4 py-2 rounded-lg font-bold text-sm border border-slate-200">
                                <Icon name="Save" className="w-4 h-4" /> Save
                            </button>
                            <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 bg-white hover:bg-slate-50 text-slate-600 px-4 py-2 rounded-lg font-bold text-sm border border-slate-200">
                                <Icon name="FolderOpen" className="w-4 h-4" /> Load
                            </button>
                            <button onClick={downloadPNG} className="flex items-center gap-2 bg-white hover:bg-slate-50 text-slate-600 px-4 py-2 rounded-lg font-bold text-sm border border-slate-200">
                                <Icon name="Download" className="w-4 h-4" /> PNG
                            </button>
                            <button onClick={downloadGIF} disabled={isExporting} className="flex items-center gap-2 bg-orange-500 hover:bg-orange-600 disabled:bg-orange-300 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg shadow-orange-500/20">
                                <Icon name="Download" className="w-4 h-4" /> {isExporting ? "EXPORTING..." : "GIF"}
                            </button>
                        </div>

                        {/* Mobile hamburger button — hidden on desktop */}
                        <button onClick={() => setMobileMenuOpen(true)} className="md:hidden p-2 rounded-xl hover:bg-slate-100 text-slate-600">
                            <Icon name="Menu" className="w-6 h-6" />
                        </button>

                        {/* Hidden file input — always present */}
                        <input ref={fileInputRef} type="file" accept=".json" className="hidden" onChange={loadProject} />
                    </header>

                    {/* Mobile full-screen overlay menu */}
                    {mobileMenuOpen && (
                        <div className="fixed inset-0 z-[200] bg-white flex flex-col md:hidden">
                            {/* Overlay header */}
                            <div className="flex items-center justify-between p-5 border-b border-slate-100">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center">
                                        <Icon name="Grid3X3" className="w-5 h-5 text-white" />
                                    </div>
                                    <span className="text-xl font-bold tracking-tighter italic uppercase">Menu</span>
                                </div>
                                <button onClick={() => setMobileMenuOpen(false)} className="p-2 rounded-xl hover:bg-slate-100 text-slate-500">
                                    <Icon name="X" className="w-6 h-6" />
                                </button>
                            </div>

                            {/* Menu items */}
                            <div className="flex-1 overflow-y-auto p-6 space-y-3">

                                {/* Grid Size */}
                                <div className="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4">
                                    <div className="flex items-center gap-3">
                                        <div className="w-9 h-9 bg-slate-100 rounded-xl flex items-center justify-center">
                                            <Icon name="Grid3X3" className="w-5 h-5 text-slate-500" />
                                        </div>
                                        <div>
                                            <div className="font-bold text-sm text-slate-800">Grid Size</div>
                                            <div className="text-xs text-slate-400">Set canvas dimensions</div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <input
                                            type="number"
                                            value={gridSize}
                                            onChange={(e) => { handleGridSizeChange(parseInt(e.target.value) || 16); }}
                                            className="w-14 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-sm font-mono text-center focus:outline-none focus:ring-2 focus:ring-orange-500/20"
                                        />
                                        <span className="text-xs text-slate-400 font-mono">px</span>
                                    </div>
                                </div>

                                {/* Save */}
                                <button onClick={() => { saveProject(); setMobileMenuOpen(false); }} className="w-full flex items-center gap-4 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 hover:bg-slate-100 transition-colors">
                                    <div className="w-9 h-9 bg-slate-100 rounded-xl flex items-center justify-center">
                                        <Icon name="Save" className="w-5 h-5 text-slate-500" />
                                    </div>
                                    <div className="text-left">
                                        <div className="font-bold text-sm text-slate-800">Save Project</div>
                                        <div className="text-xs text-slate-400">Download as .json to continue later</div>
                                    </div>
                                </button>

                                {/* Load */}
                                <button onClick={() => { fileInputRef.current.click(); setMobileMenuOpen(false); }} className="w-full flex items-center gap-4 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 hover:bg-slate-100 transition-colors">
                                    <div className="w-9 h-9 bg-slate-100 rounded-xl flex items-center justify-center">
                                        <Icon name="FolderOpen" className="w-5 h-5 text-slate-500" />
                                    </div>
                                    <div className="text-left">
                                        <div className="font-bold text-sm text-slate-800">Load Project</div>
                                        <div className="text-xs text-slate-400">Open a saved .json project file</div>
                                    </div>
                                </button>

                                {/* Export PNG */}
                                <button onClick={() => { downloadPNG(); setMobileMenuOpen(false); }} className="w-full flex items-center gap-4 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 hover:bg-slate-100 transition-colors">
                                    <div className="w-9 h-9 bg-slate-100 rounded-xl flex items-center justify-center">
                                        <Icon name="Download" className="w-5 h-5 text-slate-500" />
                                    </div>
                                    <div className="text-left">
                                        <div className="font-bold text-sm text-slate-800">Export PNG</div>
                                        <div className="text-xs text-slate-400">Download all frames as a sprite sheet</div>
                                    </div>
                                </button>

                                {/* Export GIF */}
                                <button onClick={() => { downloadGIF(); setMobileMenuOpen(false); }} disabled={isExporting} className="w-full flex items-center gap-4 bg-orange-500 disabled:bg-orange-300 rounded-2xl px-5 py-4 hover:bg-orange-600 transition-colors">
                                    <div className="w-9 h-9 bg-orange-400 rounded-xl flex items-center justify-center">
                                        <Icon name="Download" className="w-5 h-5 text-white" />
                                    </div>
                                    <div className="text-left">
                                        <div className="font-bold text-sm text-white">Export GIF</div>
                                        <div className="text-xs text-orange-100">{isExporting ? "Exporting, please wait..." : "Download animated GIF"}</div>
                                    </div>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Load error banner */}
                    {loadError && (
                        <div className="bg-red-50 border-b border-red-200 px-6 py-3 flex items-center justify-between">
                            <span className="text-red-600 text-sm font-medium">{loadError}</span>
                            <button onClick={() => setLoadError('')} className="text-red-400 hover:text-red-600 text-xs font-bold uppercase">Dismiss</button>
                        </div>
                    )}

                    <main className="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-8">
                        <div className="space-y-6 min-w-0">
                            {/* Editor */}
                            <div className="flex flex-col items-center justify-center bg-white border border-slate-200 rounded-3xl p-8 min-h-[500px] shadow-xl relative">
                                <div
                                    className="grid gap-0 border border-slate-200 shadow-2xl"
                                    style={{
                                        gridTemplateColumns: `repeat(${gridSize}, 1fr)`,
                                        width: 'min(80vw, 600px)',
                                        aspectRatio: '1/1',
                                        backgroundColor: canvasBgColor
                                    }}
                                    onMouseDown={() => setIsMouseDown(true)}
                                    onMouseUp={() => setIsMouseDown(false)}
                                    onMouseLeave={() => setIsMouseDown(false)}
                                >
                                    {frames[currentFrameIndex].map((color, i) => (
                                        <div
                                            key={i}
                                            onMouseDown={() => updatePixel(i)}
                                            onMouseEnter={() => isMouseDown && updatePixel(i)}
                                            className="w-full h-full border-[0.5px] border-slate-200 cursor-crosshair"
                                            style={{ backgroundColor: color }}
                                        />
                                    ))}
                                </div>

                                {/* Tools */}
                                <div className="mt-8 flex items-center gap-4 bg-slate-100 p-2 rounded-2xl border border-slate-200">
                                    <button onClick={undo} disabled={historyIndex <= 0} className="p-2 hover:bg-white rounded-xl disabled:opacity-30"><Icon name="Undo" className="w-5 h-5 text-slate-600" /></button>
                                    <button onClick={redo} disabled={historyIndex >= history.length - 1} className="p-2 hover:bg-white rounded-xl disabled:opacity-30"><Icon name="Redo" className="w-5 h-5 text-slate-600" /></button>
                                    <button onClick={() => {
                                        const newFrames = [...frames];
                                        newFrames[currentFrameIndex] = Array(gridSize * gridSize).fill(EMPTY_COLOR);
                                        setFrames(newFrames);
                                        saveToHistory(newFrames);
                                    }} className="p-2 hover:bg-red-50 text-red-500 rounded-xl"><Icon name="Trash2" className="w-5 h-5" /></button>
                                    <div className="w-px h-6 bg-slate-200" />
                                    <button onClick={() => setTool('pencil')} className={`p-2 rounded-xl transition-colors ${tool === 'pencil' ? "bg-orange-500 text-white" : "hover:bg-white text-slate-600"}`}>
                                        <Icon name="Pencil" className="w-5 h-5" />
                                    </button>
                                    <button onClick={() => setTool('eraser')} className={`p-2 rounded-xl transition-colors ${tool === 'eraser' ? "bg-orange-500 text-white" : "hover:bg-white text-slate-600"}`}>
                                        <Icon name="Eraser" className="w-5 h-5" />
                                    </button>
                                    <div className="w-px h-6 bg-slate-200" />
                                    <div className="flex flex-col items-center">
                                        <span className="text-[8px] font-bold uppercase text-slate-400 mb-1">Brush</span>
                                        <input type="color" value={brushColor} onChange={(e) => setBrushColor(e.target.value)} className="w-8 h-8 rounded-lg cursor-pointer bg-white p-0.5 border border-slate-200" />
                                    </div>
                                </div>
                            </div>

                            {/* Timeline */}
                            <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-lg overflow-hidden">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400">Timeline</h3>
                                    <div className="flex gap-2">
                                        <button onClick={addFrame} className="p-2 hover:bg-slate-100 rounded-xl text-orange-500 border border-slate-100"><Icon name="Plus" className="w-4 h-4" /></button>
                                        <button onClick={duplicateFrame} className="p-2 hover:bg-slate-100 rounded-xl text-slate-400 border border-slate-100"><Icon name="Copy" className="w-4 h-4" /></button>
                                    </div>
                                </div>
                                <div className="flex gap-4 overflow-x-auto pb-4 timeline-scroll">
                                    {frames.map((frame, i) => (
                                        <div key={i} onClick={() => setCurrentFrameIndex(i)} className={`relative flex-shrink-0 w-24 h-24 rounded-2xl border-2 cursor-pointer transition-all overflow-hidden bg-slate-50 ${currentFrameIndex === i ? "border-orange-500 scale-105 shadow-lg" : "border-slate-100 hover:border-slate-200"}`}>
                                            <div className="grid w-full h-full" style={{ gridTemplateColumns: `repeat(${gridSize}, 1fr)`, backgroundColor: canvasBgColor }}>
                                                {frame.map((color, j) => <div key={j} style={{ backgroundColor: color }} />)}
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); deleteFrame(i); }} className="absolute top-2 right-2 p-1 bg-white hover:bg-red-500 hover:text-white text-red-500 rounded-lg shadow-sm"><Icon name="Trash2" className="w-3 h-3" /></button>
                                            <div className="absolute bottom-2 left-2 px-2 py-0.5 bg-white/90 rounded-md text-[10px] font-bold text-slate-400">{i + 1}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Sidebar */}
                        <aside className="space-y-6">
                            <div className="bg-white border border-slate-200 rounded-3xl p-6 space-y-4 shadow-lg">
                                <h3 className="text-sm font-bold uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="User" className="w-4 h-4 text-orange-500" /> Student Info
                                </h3>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Your Name</label>
                                    <input
                                        type="text"
                                        placeholder="Type your name..."
                                        value={studentName}
                                        onChange={(e) => setStudentName(e.target.value)}
                                        className="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 focus:outline-none focus:ring-2 focus:ring-orange-500/20 transition-all font-medium"
                                    />
                                </div>
                            </div>

                            <div className="bg-white border border-slate-200 rounded-3xl p-6 space-y-6 shadow-lg">
                                <h3 className="text-sm font-bold uppercase tracking-widest">Preview</h3>
                                <div className="aspect-square bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center overflow-hidden relative">
                                    <div className="grid w-full h-full" style={{ gridTemplateColumns: `repeat(${gridSize}, 1fr)`, backgroundColor: canvasBgColor }}>
                                        {frames[currentFrameIndex].map((color, i) => <div key={i} style={{ backgroundColor: color }} />)}
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <button onClick={() => setIsPlaying(!isPlaying)} className={`w-full flex items-center justify-center gap-2 py-4 rounded-2xl font-bold transition-all shadow-lg ${isPlaying ? "bg-slate-900 text-white" : "bg-orange-500 text-white hover:bg-orange-600"}`}>
                                        <Icon name={isPlaying ? "Pause" : "Play"} className="w-5 h-5" /> {isPlaying ? "PAUSE" : "PLAY"}
                                    </button>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                                            <span>Playback Speed</span>
                                            <span className="text-orange-500">{fps} FPS</span>
                                        </div>
                                        <input type="range" min="1" max="24" value={fps} onChange={(e) => setFps(parseInt(e.target.value))} className="w-full h-2 rounded-lg cursor-pointer" />
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white border border-slate-200 rounded-3xl p-6 space-y-4 shadow-lg">
                                <h3 className="text-sm font-bold uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="Settings" className="w-4 h-4 text-orange-500" /> Canvas Settings
                                </h3>
                                <div className="flex items-center justify-between">
                                    <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Background</span>
                                    <input type="color" value={canvasBgColor} onChange={(e) => setCanvasBgColor(e.target.value)} className="w-10 h-10 rounded-xl cursor-pointer bg-white p-1 border border-slate-200" />
                                </div>
                            </div>

                            <div className="bg-white border border-slate-200 rounded-3xl p-6 space-y-4 shadow-lg">
                                <h3 className="text-sm font-bold uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="Palette" className="w-4 h-4 text-orange-500" /> Palette
                                </h3>
                                <div className="grid grid-cols-6 gap-2">
                                    {['#000000', '#ffffff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#800080', '#008000', '#800000'].map((color) => (
                                        <button key={color} onClick={() => { setBrushColor(color); setTool('pencil'); }} className={`w-full aspect-square rounded-lg border border-slate-100 transition-all ${brushColor === color ? "ring-2 ring-orange-500 ring-offset-2" : ""}`} style={{ backgroundColor: color }} />
                                    ))}
                                </div>
                            </div>
                        </aside>
                    </main>

                    <canvas ref={canvasRef} className="hidden" />

                    {/* Confirmation Modal */}
                    {pendingGridSize !== null && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setPendingGridSize(null)}></div>
                            <div className="relative bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border border-slate-200">
                                <h3 className="text-xl font-bold mb-2">Change Grid Size?</h3>
                                <p className="text-slate-500 text-sm mb-6 leading-relaxed">
                                    Changing the grid size to <span className="font-bold text-slate-900">{pendingGridSize}x{pendingGridSize}</span> will clear your current animation. This cannot be undone.
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => setPendingGridSize(null)} className="flex-1 py-3 rounded-2xl font-bold text-slate-600 hover:bg-slate-50 transition-colors">CANCEL</button>
                                    <button onClick={confirmGridSizeChange} className="flex-1 py-3 rounded-2xl font-bold bg-orange-500 text-white hover:bg-orange-600 transition-colors shadow-lg shadow-orange-500/20">CONFIRM</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
